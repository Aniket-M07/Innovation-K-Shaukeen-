<nav>
    <div class="nav-container">
        <div class="nav-left">
            <a href="/" class="logo-container" aria-label="Home">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="K.R. Mangalam University Logo"
                    class="logo-image" />
            </a>
        </div>

        <div class="nav-center">
            <ul class="nav-menu">
                <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="/campus-map" class="{% if active_page == 'map' %}active{% endif %}">Map</a></li>
                <li><a href="/faculty" class="{% if active_page == 'faculty' %}active{% endif %}">Faculty</a></li>
                <li><a href="/notifications"
                        class="{% if active_page == 'notifications' %}active{% endif %}">Notifications</a></li>
                <li><a href="/profile" class="{% if active_page == 'profile' %}active{% endif %}">Profile</a></li>
            </ul>
        </div>

        <div class="nav-right">
            {% if session.get('user_id') %}
            <span class="user-summary">👤 {{ session.get('user_name', 'Guest') }} <span class="badge">{{
                    session.get('role', '') }}</span></span>
            <a href="{{ url_for('logout') }}" class="action-link">Logout</a>
            {% else %}
            <a href="{{ url_for('login') }}" class="action-link">Login</a>
            <a href="{{ url_for('signup') }}" class="action-link signup">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>
