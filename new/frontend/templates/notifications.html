<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notifications - Intelligent Campus Search Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include '_navbar.html' %}

    <div class="container">
        <section class="card">
            <h2>🔔 Notifications</h2>
            <p>All notifications are marked read when you open this screen.</p>
            <div class="notification-list">
                {% for note in notifications %}
                <div class="notification-item {{ 'unread' if not note.read else 'read' }}">
                    <strong>{{ note.title }}</strong>
                    <span>{{ 'Unread' if not note.read else 'Read' }}</span>
                </div>
                {% endfor %}
            </div>
        </section>
    </div>
</body>

</html>
